; Custom PHP settings for Amu platform

upload_max_filesize = 20M
post_max_size = 25M
memory_limit = 256M
max_execution_time = 60

; OPcache (disable in dev by setting opcache.enable=0)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0
