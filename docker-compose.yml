services:

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - ./stack.env
    volumes:
      - amu_runtime_secrets:/run/amu-secrets
    networks:
      - amu_net
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    networks:
      - amu_net
    depends_on:
      - app

  mysql:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    restart: unless-stopped
    env_file:
      - ./stack.env
    volumes:
      - amu_mysql_data:/var/lib/mysql
      - amu_runtime_secrets:/run/amu-secrets
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - amu_net

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - amu_redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - amu_net

  horizon:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - ./stack.env
    volumes:
      - amu_runtime_secrets:/run/amu-secrets
    command: php artisan horizon
    networks:
      - amu_net
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started

  reverb:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - ./stack.env
    volumes:
      - amu_runtime_secrets:/run/amu-secrets
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "${REVERB_PORT:-8080}:8080"
    networks:
      - amu_net
    depends_on:
      redis:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    env_file:
      - ./stack.env
    command:
      - /bin/sh
      - -lc
      - |
        TOKEN="$$(printf '%s' "$${CLOUDFLARED_TUNNEL_TOKEN:-}" | tr '[:upper:]' '[:lower:]')"
        if [ -z "$$TOKEN" ] || [ "$$TOKEN" = "null" ]; then
          echo "CLOUDFLARED_TUNNEL_TOKEN is empty/null, cloudflared disabled."
          tail -f /dev/null
        else
          exec cloudflared tunnel --no-autoupdate --loglevel "$${CLOUDFLARED_LOGLEVEL:-info}" run --token "$${CLOUDFLARED_TUNNEL_TOKEN}"
        fi
    networks:
      - amu_net
    depends_on:
      nginx:
        condition: service_started
    profiles:
      - tunnel

volumes:
  amu_mysql_data:
  amu_redis_data:
  amu_runtime_secrets:

networks:
  amu_net:
    driver: bridge
